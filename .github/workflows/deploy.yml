name: Deploy PayAI Guardian

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  DEPLOY_PATH: /home/ubuntu/payai-guardian
  NEXT_HIRE_PATH: /home/ubuntu/Next_Hire_Job_Portal

jobs:

  # ── 1. SAFETY CHECK ─────────────────────────────────────────────────────────
  safety-check:
    name: 🔒 Safety Check (Preserve Next_Hire)
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Verify Next_Hire exists and is running
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            if [ ! -d '${{ env.NEXT_HIRE_PATH }}' ]; then
              echo '❌ CRITICAL: Next_Hire_Job_Portal not found! Aborting.'
              exit 1
            fi
            echo '✅ Next_Hire_Job_Portal directory is safe.'
            source ~/.nvm/nvm.sh
            if pm2 list | grep -q 'next-hire'; then
              echo '✅ Next_Hire PM2 processes are running.'
            else
              echo '⚠️  Warning: next-hire processes not found in PM2.'
            fi
          "

  # ── 2. DEPLOY BACKEND MICROSERVICES ─────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend Microservices
    runs-on: ubuntu-latest
    needs: safety-check
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directories on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mkdir -p ${{ env.DEPLOY_PATH }}/server
            mkdir -p ${{ env.DEPLOY_PATH }}/client
          "

      - name: Sync server source files
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'dist' \
            --exclude 'logs' \
            --exclude '*.log' \
            ./server/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/server/

      # ── FIX: Generate .env files on the runner using printf (no heredocs).
      #        Heredocs inside a run: | block create unindented lines that
      #        terminate the YAML block scalar prematurely → parse error.
      #        printf '%s\n' "KEY=VAL" safely handles % chars in values.
      - name: Generate backend .env files on runner
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRE: ${{ secrets.JWT_EXPIRE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_EMAIL_API_KEY: ${{ secrets.RESEND_EMAIL_API_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          # API Gateway (port 8000)
          printf '%s\n' \
            "PORT=8000" \
            "NODE_ENV=production" \
            "JWT_SECRET=${JWT_SECRET}" \
            "JWT_EXPIRE=${JWT_EXPIRE}" \
            "DATABASE_URL=${DATABASE_URL}" \
            "FRONTEND_URL=${FRONTEND_URL}" \
            "CORS_ALLOWED_ORIGINS=http://${SERVER_HOST}:3002" \
            > ./server/api-gateway/.env

          # User Service (port 8001)
          printf '%s\n' \
            "PORT=8001" \
            "NODE_ENV=production" \
            "JWT_SECRET=${JWT_SECRET}" \
            "JWT_EXPIRE=${JWT_EXPIRE}" \
            "DATABASE_URL=${DATABASE_URL}" \
            "FRONTEND_URL=${FRONTEND_URL}" \
            "API_GATEWAY_URL=${API_GATEWAY_URL}" \
            "RESEND_EMAIL_API_KEY=${RESEND_EMAIL_API_KEY}" \
            > ./server/user-services/.env

          # Payment Service (port 8002)
          printf '%s\n' \
            "PORT=8002" \
            "NODE_ENV=production" \
            "JWT_SECRET=${JWT_SECRET}" \
            "DATABASE_URL=${DATABASE_URL}" \
            > ./server/payment-service/.env

          # Fraud Detection Service (port 8003)
          printf '%s\n' \
            "PORT=8003" \
            "NODE_ENV=production" \
            "JWT_SECRET=${JWT_SECRET}" \
            "DATABASE_URL=${DATABASE_URL}" \
            > ./server/fraud-detection-service/.env

          # AI Banking Service (port 8004)
          printf '%s\n' \
            "PORT=8004" \
            "NODE_ENV=production" \
            "DATABASE_URL=${DATABASE_URL}" \
            "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            > ./server/ai-banking-service/.env

          # Analytics Service (port 8005)
          printf '%s\n' \
            "PORT=8005" \
            "NODE_ENV=production" \
            "DATABASE_URL=${DATABASE_URL}" \
            > ./server/analytics-service/.env

          # Notification Service (port 8006)
          printf '%s\n' \
            "PORT=8006" \
            "NODE_ENV=production" \
            "RESEND_EMAIL_API_KEY=${RESEND_EMAIL_API_KEY}" \
            > ./server/notification-service/.env

          echo '✅ All backend .env files generated on runner.'

      - name: Sync .env files to server
        run: |
          for svc in api-gateway user-services payment-service fraud-detection-service ai-banking-service analytics-service notification-service; do
            rsync -avz \
              "./server/${svc}/.env" \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/server/${svc}/.env"
          done
          echo '✅ All .env files synced to server.'

      - name: Install dependencies & build microservices on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            source ~/.nvm/nvm.sh
            cd ${{ env.DEPLOY_PATH }}/server
            echo '📦 Installing root dependencies...'
            npm install --silent
            echo '📦 Installing microservice dependencies...'
            npm run install:all
            echo '🔨 Building all microservices (TypeScript → JS)...'
            npm run build:all
            echo '✅ Backend build complete.'
          "

      - name: Restart microservices via PM2
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            source ~/.nvm/nvm.sh
            cd ${{ env.DEPLOY_PATH }}/server
            command -v pm2 || npm install -g pm2
            for svc in payai-api-gateway payai-user-service payai-payment-service payai-fraud-detection payai-ai-banking payai-analytics payai-notification; do
              pm2 delete \$svc 2>/dev/null || true
            done
            pm2 start ecosystem.config.js --env production --update-env
            pm2 save
            echo '✅ Microservices restarted.'
            pm2 list
          "

  # ── 3. DEPLOY FRONTEND ──────────────────────────────────────────────────────
  deploy-frontend:
    name: 🖥️ Deploy Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: safety-check
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # Generate .env.local on runner so rsync carries it to server.
      # Removing the old --exclude '.env.local' avoids the need for a
      # second SSH command just to write one line on the server.
      - name: Generate frontend .env.local on runner
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          printf '%s\n' \
            "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            > ./client/.env.local
          echo '✅ Frontend .env.local generated.'

      - name: Create client deployment directory on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mkdir -p ${{ env.DEPLOY_PATH }}/client
          "

      - name: Sync client source files (includes .env.local)
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.next' \
            ./client/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/client/

      - name: Install, build & restart frontend on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            source ~/.nvm/nvm.sh
            cd ${{ env.DEPLOY_PATH }}/client
            echo '📦 Installing frontend dependencies...'
            npm install --silent
            echo '🔨 Building Next.js...'
            npm run build
            echo '🚀 Restarting payai-frontend via PM2...'
            if pm2 list | grep -q 'payai-frontend'; then
              pm2 restart payai-frontend --update-env
            else
              pm2 start npm --name payai-frontend -- run start
            fi
            pm2 save
            echo '✅ Frontend deployed and running on port 3002.'
          "

  # ── 4. FINAL VERIFICATION ───────────────────────────────────────────────────
  verify:
    name: ✅ Verify All Services
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Check all PM2 processes & ports
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            source ~/.nvm/nvm.sh
            echo '========================================='
            echo '  📊 ALL PM2 PROCESSES'
            echo '========================================='
            pm2 list
            echo ''
            echo '========================================='
            echo '  📡 ACTIVE PORTS'
            echo '========================================='
            sudo netstat -tulpn 2>/dev/null | grep -E ':(3000|3001|3002|8000|8001|8002|8003|8004|8005|8006)' | grep LISTEN || true
            echo ''
            echo '========================================='
            echo '  🔒 NEXT_HIRE SAFETY CHECK'
            echo '========================================='
            if pm2 list | grep -q 'next-hire'; then
              pm2 list | grep 'next-hire'
              echo '✅ Next_Hire processes are healthy.'
            else
              echo '⚠️  Warning: next-hire processes not detected in PM2.'
            fi
            echo ''
            echo '🎉 PayAI Guardian deployment complete!'
            echo '   Frontend    → http://${{ secrets.SERVER_HOST }}:3002'
            echo '   API Gateway → http://${{ secrets.SERVER_HOST }}:8000'
          "