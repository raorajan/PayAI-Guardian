name: Deploy PayAI Guardian (Safe - Preserves Next_Hire)

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

env:
  DEPLOY_PATH: /home/ubuntu/payai-guardian
  NEXT_HIRE_PATH: /home/ubuntu/Next_Hire_Job_Portal
  NODE_VERSION: '22.x'  # Updated to Node.js 22

jobs:
  # Skip tests if no package.json exists
  check-structure:
    runs-on: ubuntu-latest
    outputs:
      has_server: ${{ steps.check.outputs.has_server }}
      has_client: ${{ steps.check.outputs.has_client }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          echo "has_server=${{ hashFiles('server/package.json') != '' }}" >> $GITHUB_OUTPUT
          echo "has_client=${{ hashFiles('client/package.json') != '' }}" >> $GITHUB_OUTPUT
          echo "Repository structure checked"

  build-frontend:
    runs-on: ubuntu-latest
    needs: check-structure
    if: needs.check-structure.outputs.has_client == 'true'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies (with lock file generation)
        working-directory: ./client
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install --package-lock-only
            npm ci
          fi
      
      - name: Build Next.js app
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/.next
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [check-structure, build-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: client/.next
        continue-on-error: true
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: SAFETY CHECK - Verify Next_Hire exists before deployment
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            if [ -d '${{ env.NEXT_HIRE_PATH }}' ]; then
              echo '✅ SAFETY CHECK: Next_Hire_Job_Portal found at ${{ env.NEXT_HIRE_PATH }}'
              echo '📊 Next_Hire PM2 Status:'
              pm2 list | grep -i next || echo 'Next_Hire not in PM2'
              echo ''
              echo '⚠️  This deployment will NOT affect Next_Hire'
              echo '   - Next_Hire location: ${{ env.NEXT_HIRE_PATH }}'
              echo '   - PayAI location: ${{ env.DEPLOY_PATH }}'
              echo '   - They are completely separate directories'
            else
              echo '❌ CRITICAL: Next_Hire_Job_Portal not found!'
              echo 'This deployment will ABORT to prevent data loss'
              exit 1
            fi
          "
      
      - name: Create PayAI Guardian directory (separate from Next_Hire)
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            # Create separate directory for PayAI
            mkdir -p ${{ env.DEPLOY_PATH }}
            mkdir -p ${{ env.DEPLOY_PATH }}/client
            mkdir -p ${{ env.DEPLOY_PATH }}/server
            mkdir -p ${{ env.DEPLOY_PATH }}/logs
            
            # Verify Next_Hire is still there
            ls -la ~/ | grep -E 'Next_Hire|payai'
            
            echo '📁 Directory structure:'
            echo '  - Next_Hire: ${{ env.NEXT_HIRE_PATH }}'
            echo '  - PayAI:     ${{ env.DEPLOY_PATH }}'
          "
      
      - name: Copy server files (if they exist)
        run: |
          if [ -d "./server" ]; then
            rsync -avz --delete \
              --exclude 'node_modules' \
              --exclude '.env' \
              --exclude 'logs' \
              --exclude '*.log' \
              ./server/ \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/server/
          else
            echo '⚠️  No server directory found, skipping...'
          fi
      
      - name: Copy client files
        run: |
          if [ -d "./client" ]; then
            rsync -avz --delete \
              --exclude 'node_modules' \
              --exclude '.env.local' \
              ./client/ \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/client/
          fi
      
      - name: Deploy PayAI Guardian (Isolated Deployment)
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            export NVM_DIR="\$HOME/.nvm"
            [ -s "\$NVM_DIR/nvm.sh" ] && \. "\$NVM_DIR/nvm.sh"
            
            set -e
            
            cd ${{ env.DEPLOY_PATH }}
            
            echo '🚀 Starting PayAI Guardian deployment...'
            echo '🔒 Next_Hire_Job_Portal remains untouched at ${{ env.NEXT_HIRE_PATH }}'
            
            # Install backend dependencies if server exists
            if [ -d \"server\" ] && [ -f \"server/package.json\" ]; then
              echo '📦 Setting up backend...'
              cd server
              
              # Install dependencies (create lock file if missing)
              if [ -f \"package-lock.json\" ]; then
                npm ci --production --silent || npm install --production
              else
                npm install --production
              fi
              
              # Install all microservices dependencies
              echo '📦 Installing microservice dependencies...'
              npm run install:all
              
              # Build all microservices
              echo '🔨 Building microservices...'
              npm run build:all
              
              cd ..
            fi
            
            # Setup frontend if it exists
            if [ -d \"client\" ] && [ -f \"client/package.json\" ]; then
              echo '📦 Setting up frontend...'
              cd client
              
              if [ -f \"package-lock.json\" ]; then
                npm ci --production --silent || npm install --production
              else
                npm install --production
              fi
              
              # Create .env for frontend
              echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.local
              
              cd ..
            fi
            
            # Create backend .env files if server exists
            if [ -d "server" ]; then
              cd server
              
              # API Gateway env
              mkdir -p api-gateway
              echo "PORT=8000" > api-gateway/.env
              echo "NODE_ENV=production" >> api-gateway/.env
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> api-gateway/.env
              echo "JWT_EXPIRE=${{ secrets.JWT_EXPIRE }}" >> api-gateway/.env
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> api-gateway/.env
              
              # User Services env
              mkdir -p user-services
              echo "PORT=8001" > user-services/.env
              echo "NODE_ENV=production" >> user-services/.env
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> user-services/.env
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> user-services/.env
              
              # Notification Service env
              mkdir -p notification-service
              echo "PORT=8006" > notification-service/.env
              echo "NODE_ENV=production" >> notification-service/.env
              echo "RESEND_EMAIL_API_KEY=${{ secrets.RESEND_EMAIL_API_KEY }}" >> notification-service/.env
              
              cd ..
            fi
            
            # Install PM2 if not present
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi
            
            # Stop ONLY PayAI processes (not Next_Hire)
            pm2 list | grep 'payai' | awk '{print \$2}' | xargs -r pm2 delete
            
            # Start PayAI services with ecosystem file
            if [ -f \"server/ecosystem.config.js\" ]; then
              pm2 start server/ecosystem.config.js --env production
            else
              echo "❌ Ecosystem configuration file not found at server/ecosystem.config.js!"
              exit 1
            fi
            
            # Start Frontend
            if [ -d \"client\" ] && [ -f \"client/package.json\" ]; then
              echo '🚀 Starting frontend service...'
              cd client
              if pm2 list | grep -q 'payai-frontend'; then
                pm2 restart payai-frontend
              else
                pm2 start npm --name payai-frontend -- run start -- --port 3002
              fi
              cd ..
            fi
            
            # Save PM2 config (only current processes)
            pm2 save
            
            # Show running processes (verify Next_Hire still there)
            echo ''
            echo '📊 All PM2 Processes:'
            pm2 list
            
            echo ''
            echo '✅ Next_Hire_Job_Portal status:'
            pm2 list | grep -i 'next' || echo 'Next_Hire not managed by PM2 (but files are safe)'
            
            echo ''
            echo '🎉 PayAI Guardian deployment complete!'
            echo '📍 Next_Hire location: ${{ env.NEXT_HIRE_PATH }}'
            echo '📍 PayAI location: ${{ env.DEPLOY_PATH }}'
            echo '🔌 PayAI Ports: 3002 (frontend), 8000-8006 (backend)'
          "
      
      - name: Final Safety Verification
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            echo '🔒 FINAL SAFETY CHECK'
            echo '======================='
            
            # Check Next_Hire directory still exists
            if [ -d '${{ env.NEXT_HIRE_PATH }}' ]; then
              echo '✅ Next_Hire_Job_Portal directory: EXISTS'
              ls -la ${{ env.NEXT_HIRE_PATH }}
            else
              echo '❌ CRITICAL: Next_Hire_Job_Portal directory missing!'
              exit 1
            fi
            
            # Check PayAI directory was created
            if [ -d '${{ env.DEPLOY_PATH }}' ]; then
              echo '✅ PayAI Guardian directory: EXISTS'
            fi
            
            # Show port usage (verify no conflicts)
            echo ''
            echo '📡 Port Usage:'
            sudo netstat -tulpn 2>/dev/null | grep -E ':(3000|3001|3002|8000|8001|8002)' | grep LISTEN || echo 'No conflicting ports found'
            
            echo ''
            echo '✨ Both applications are safely running!'
          "