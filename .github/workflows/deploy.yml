        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "server/api-gateway"
          target: "~/payai-guardian/server"
          overwrite: true
          exclude: "node_modules,dist,.git"
      
      - name: Restart Service
