name: Deploy PayAI Guardian

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy Frontend'
        type: boolean
        default: false
      deploy_api_gateway:
        description: 'Deploy API Gateway (Port 8000)'
        type: boolean
        default: false
      deploy_user_service:
        description: 'Deploy User Service (Port 8001)'
        type: boolean
        default: false
      deploy_payment_service:
        description: 'Deploy Payment Service (Port 8002)'
        type: boolean
        default: false
      deploy_fraud_service:
        description: 'Deploy Fraud Detection (Port 8003)'
        type: boolean
        default: false
      deploy_ai_service:
        description: 'Deploy AI Banking (Port 8004)'
        type: boolean
        default: false
      deploy_analytics_service:
        description: 'Deploy Analytics (Port 8005)'
        type: boolean
        default: false
      deploy_notification_service:
        description: 'Deploy Notification (Port 8006)'
        type: boolean
        default: false
      deploy_all_backend:
        description: 'Deploy ALL Backend Services'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # FRONTEND DEPLOYMENT
  # ===========================================
  frontend-deploy:
    name: Frontend (3002)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true)
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: client
        run: npm ci

      - name: Build Frontend
        working-directory: client
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Sync to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "client"
          target: "~/payai-guardian"
          overwrite: true
          exclude: "node_modules,.next,.git"

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd ~/payai-guardian/client
            
            echo "📦 Installing dependencies..."
            npm ci --omit=dev
            
            echo "🔨 Building..."
            npm run build
            
            echo "🚀 Restarting service..."
            pm2 restart payai-frontend || pm2 start npm --name "payai-frontend" -- start
            pm2 save
            
            echo "✅ Frontend deployed!"
            pm2 status payai-frontend

  # ===========================================
  # BACKEND SERVICES DEPLOYMENT
  # ===========================================

  # --- API Gateway ---
  deploy-api-gateway:
    name: API Gateway (8000)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && 
       (inputs.deploy_api_gateway == true || inputs.deploy_all_backend == true))
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Sync Shared to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "server/shared"
          target: "~/payai-guardian/server"
          overwrite: true
          exclude: "node_modules"
      
      - name: Sync API Gateway to Server
