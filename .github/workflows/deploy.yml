name: Deploy PayAI Guardian

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: 'Deploy Frontend'
        type: boolean
        default: false
      deploy_api_gateway:
        description: 'Deploy API Gateway (Port 8000)'
        type: boolean
        default: false
      deploy_user_service:
        description: 'Deploy User Service (Port 8001)'
        type: boolean
        default: false
      deploy_payment_service:
        description: 'Deploy Payment Service (Port 8002)'
        type: boolean
        default: false
      deploy_fraud_service:
        description: 'Deploy Fraud Detection (Port 8003)'
        type: boolean
        default: false
      deploy_ai_service:
        description: 'Deploy AI Banking (Port 8004)'
        type: boolean
        default: false
      deploy_analytics_service:
        description: 'Deploy Analytics (Port 8005)'
        type: boolean
        default: false
      deploy_notification_service:
        description: 'Deploy Notification (Port 8006)'
        type: boolean
        default: false
      deploy_all_backend:
        description: 'Deploy ALL Backend Services'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  sync-shared:
    name: Sync Shared Library
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Sync Shared Library to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "server/shared"
          target: "~/payai-guardian/server"
          overwrite: true
          exclude: "node_modules,.git"
      
      - name: Install Shared Dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ~/payai-guardian/server/shared
            if [ -f "package.json" ]; then
              npm ci --omit=dev --production 2>/dev/null || npm install --production
            fi

  frontend-deploy:
    name: Frontend (Port 3002)
    runs-on: ubuntu-latest
    needs: sync-shared
    if: >
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true)
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: client
        run: npm ci

      - name: Build Frontend
        working-directory: client
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Sync Frontend to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "client"
          target: "~/payai-guardian"
          overwrite: true
          exclude: "node_modules,.next,.git"

      - name: Restart Frontend Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd ~/payai-guardian/client
            
            npm ci --omit=dev --production
            npm run build
            
            pm2 delete payai-frontend 2>/dev/null || true
            PORT=3002 pm2 start npm --name "payai-frontend" -- start
            pm2 save
            pm2 status payai-frontend

  deploy-api-gateway:
    name: API Gateway (8000)
    runs-on: ubuntu-latest
    needs: sync-shared
    if: >
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && 
       (inputs.deploy_api_gateway == true || inputs.deploy_all_backend == true))
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Sync API Gateway
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "server/api-gateway"
          target: "~/payai-guardian/server"
          overwrite: true
          exclude: "node_modules,dist,.git"
      
      - name: Setup and Start API Gateway
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd ~/payai-guardian/server/api-gateway
            
            npm ci --omit=dev --production
            npm run build 2>/dev/null || echo "Building..."
            
            pm2 delete payai-gateway 2>/dev/null || true
            
            PORT=8000 \
            NODE_ENV=production \
            API_GATEWAY_URL=http://localhost:8000 \
            JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            pm2 start dist/server.js --name "payai-gateway"
            
            pm2 save
            pm2 status payai-gateway

  deploy-user-service:
    name: User Service (8001)
    runs-on: ubuntu-latest
    needs: sync-shared
    if: >
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && 
