      - name: Setup and Start User Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd ~/payai-guardian/server/user-services
            
            npm ci --omit=dev --production
            npm run build 2>/dev/null || echo "Building..."
            
            pm2 delete payai-user-service 2>/dev/null || true
            
            PORT=8001 \
            NODE_ENV=production \
            AUTH_SERVICE_URL=http://localhost:8001 \
            API_GATEWAY_URL=http://localhost:8000 \
            FRONTEND_URL=http://localhost:3000 \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            JWT_SECRET='${{ secrets.JWT_SECRET }}' \
            JWT_EXPIRE=7d \
            RESEND_EMAIL_API_KEY='${{ secrets.RESEND_EMAIL_API_KEY }}' \
            ROLE='USER' \
            ADMIN='ADMIN' \
            pm2 start dist/server.js --name "payai-user-service"
            
            pm2 save
            pm2 status payai-user-service

