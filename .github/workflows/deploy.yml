name: Deploy PayAI Guardian

on:
  push:
    branches: [main, master, staging]
    paths:
      - 'client/**'
      - 'server/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - 'server/**'

env:
  DEPLOY_PATH: ~/payai-guardian
  NODE_VERSION: '20.x'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-services, payment-service, fraud-detection-service, ai-banking-service, analytics-service, notification-service]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install root dependencies
        run: |
          cd server
          npm ci
      
      - name: Test ${{ matrix.service }}
        run: |
          cd server/${{ matrix.service }}
          npm test --if-present
        continue-on-error: false
  
  build-frontend:
    runs-on: ubuntu-latest
    needs: test-and-build
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Build Next.js app
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/.next
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [test-and-build, build-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: client/.next
      
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Create deployment directory
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            mkdir -p ${{ env.DEPLOY_PATH }}
            mkdir -p ${{ env.DEPLOY_PATH }}/client
            mkdir -p ${{ env.DEPLOY_PATH }}/server
            mkdir -p ${{ env.DEPLOY_PATH }}/logs
          "
      
      - name: Copy server files
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'logs' \
            --exclude '*.log' \
            ./server/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/server/
      
      - name: Copy client files
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.env.local' \
            ./client/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/client/
      
      - name: Copy ecosystem config
        run: |
          scp ./server/ecosystem.config.js \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/ecosystem.config.js
      
      - name: Remote deployment script
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            set -e
            
            cd ${{ env.DEPLOY_PATH }}
            
            echo '🚀 Starting PayAI Guardian deployment...'
            
            # Install backend dependencies for each microservice
            cd server
            for service in api-gateway user-services payment-service fraud-detection-service ai-banking-service analytics-service notification-service shared; do
              if [ -d \"\$service\" ] && [ -f \"\$service/package.json\" ]; then
                echo \"📦 Installing dependencies for \$service...\"
                cd \"\$service\"
                npm ci --production --silent
                cd ..
              fi
            done
            
            # Install root shared dependencies
            if [ -f \"package.json\" ]; then
              npm ci --production --silent
            fi
            
            # Setup frontend
            cd ../client
            if [ -f \"package.json\" ]; then
              echo '📦 Installing frontend dependencies...'
              npm ci --production --silent
            fi
            
            # Create .env files for each service using existing secrets
            cd ../server
            
            # API Gateway env
            cat > api-gateway/.env << 'EOF'
            PORT=8000
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE=${{ secrets.JWT_EXPIRE }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            RATE_LIMIT_WINDOW=900000
            RATE_LIMIT_MAX=100
            EOF
            
            # User Services env
            cat > user-services/.env << 'EOF'
            PORT=8001
            NODE_ENV=production
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE=${{ secrets.JWT_EXPIRE }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EOF
            
            # Payment Service env
            cat > payment-service/.env << 'EOF'
            PORT=8002
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            # Add Stripe/PayPal keys when available
            EOF
            
            # Fraud Detection Service env
            cat > fraud-detection-service/.env << 'EOF'
            PORT=8003
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            EOF
            
            # AI Banking Service env
            cat > ai-banking-service/.env << 'EOF'
            PORT=8004
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            EOF
            
            # Analytics Service env
            cat > analytics-service/.env << 'EOF'
            PORT=8005
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            EOF
            
            # Notification Service env
            cat > notification-service/.env << 'EOF'
            PORT=8006
            NODE_ENV=production
            RESEND_EMAIL_API_KEY=${{ secrets.RESEND_EMAIL_API_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EOF
            
            echo '✅ Environment files created'
            
            # Install PM2 if not present
            if ! command -v pm2 &> /dev/null; then
              echo '📦 Installing PM2...'
              npm install -g pm2
            fi
            
            # Stop existing PayAI Guardian processes (if any)
            pm2 delete ecosystem.config.js 2>/dev/null || true
            
            # Start all microservices with PM2
            echo '🚀 Starting microservices with PM2...'
            pm2 start ecosystem.config.js --env production
            
            # Save PM2 process list
            pm2 save
            
            # Setup PM2 to start on system boot
            pm2 startup systemd -u ${{ secrets.SERVER_USER }} --hp /home/${{ secrets.SERVER_USER }} 2>/dev/null || true
            
            # Wait for services to start
            sleep 8
            
            # Check PM2 status
            echo '📊 PM2 Process Status:'
            pm2 status
            
            # Health check each service
            echo '🏥 Running health checks...'
            
            # Check API Gateway
            if curl -f -s http://localhost:8000/health > /dev/null; then
              echo '✅ API Gateway (Port 8000) is healthy'
            else
              echo '❌ API Gateway (Port 8000) health check failed'
              exit 1
            fi
            
            # Check User Service
            if curl -f -s http://localhost:8001/health > /dev/null; then
              echo '✅ User Service (Port 8001) is healthy'
            else
              echo '❌ User Service (Port 8001) health check failed'
              exit 1
            fi
            
            # Check Payment Service
            if curl -f -s http://localhost:8002/health > /dev/null; then
              echo '✅ Payment Service (Port 8002) is healthy'
            else
              echo '⚠️  Payment Service (Port 8002) health check failed'
            fi
            
            # Check Fraud Detection
            if curl -f -s http://localhost:8003/health > /dev/null; then
              echo '✅ Fraud Detection (Port 8003) is healthy'
            else
              echo '⚠️  Fraud Detection (Port 8003) health check failed'
            fi
            
            # Check AI Banking
            if curl -f -s http://localhost:8004/health > /dev/null; then
              echo '✅ AI Banking (Port 8004) is healthy'
            else
              echo '⚠️  AI Banking (Port 8004) health check failed'
            fi
            
            # Check Analytics
            if curl -f -s http://localhost:8005/health > /dev/null; then
              echo '✅ Analytics (Port 8005) is healthy'
            else
              echo '⚠️  Analytics (Port 8005) health check failed'
            fi
            
            # Check Notification
            if curl -f -s http://localhost:8006/health > /dev/null; then
              echo '✅ Notification (Port 8006) is healthy'
            else
              echo '⚠️  Notification (Port 8006) health check failed'
            fi
            
            echo '✅ All critical services are running!'
            
            # Display process list with ports
            echo ''
            echo '📋 Running PM2 processes:'
            pm2 list
            
            echo ''
            echo '🎉 PayAI Guardian deployment completed successfully!'
            echo '📱 Frontend: http://'${{ secrets.SERVER_HOST }}':3002'
            echo '🔌 API Gateway: http://'${{ secrets.SERVER_HOST }}':8000'
            echo '💳 Payment Service: http://'${{ secrets.SERVER_HOST }}':8002'
            echo '🤖 AI Banking: http://'${{ secrets.SERVER_HOST }}':8004'
          "
      
      - name: Verify Next_Hire_Job_Portal is unaffected
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            echo '🔍 Checking Next_Hire_Job_Portal status...'
            if pm2 list | grep -q 'Next_Hire'; then
              echo '✅ Next_Hire_Job_Portal is still running'
              pm2 list | grep 'Next_Hire'
            else
              echo '⚠️  Next_Hire_Job_Portal not found in PM2'
            fi
            
            echo ''
            echo '📊 Port Usage Summary:'
            echo 'Next_Hire_Job_Portal: Ports 3000, 3001'
            echo 'PayAI Guardian: Ports 3002 (frontend), 8000-8006 (backend)'
            sudo netstat -tulpn | grep -E ':(3000|3001|3002|8000|8001|8002|8003|8004|8005|8006)' | grep LISTEN || echo 'No ports found'
          "
      
      - name: Deployment notification
        if: success()
        run: |
          echo "✅ PayAI Guardian successfully deployed to production!"
          echo "📦 Deployment Details:"
          echo "  - Server: ${{ secrets.SERVER_HOST }}"
          echo "  - User: ${{ secrets.SERVER_USER }}"
          echo "  - Path: ${{ env.DEPLOY_PATH }}"
          echo "  - Frontend Port: 3002"
          echo "  - Backend Ports: 8000-8006"
          echo "  - Time: $(date)"

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Rollback on failure
        run: |
          echo "⚠️ Deployment failed! Initiating rollback..."
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd ${{ env.DEPLOY_PATH }}
            pm2 list
            echo 'Checking previous stable version...'
            if [ -d '../payai-guardian-backup' ]; then
              echo 'Restoring from backup...'
              rm -rf ${{ env.DEPLOY_PATH }}
              cp -r ../payai-guardian-backup ${{ env.DEPLOY_PATH }}
              cd ${{ env.DEPLOY_PATH }}
              pm2 start ecosystem.config.js --env production
              echo '✅ Rollback completed'
            else
              echo 'No backup found, manual intervention required'
              exit 1
            fi
          "