name: Deploy PayAI Guardian

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # FRONTEND BUILD & DEPLOY
  # ===========================================
  frontend-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: client
        run: npm ci

      - name: Build Frontend
        working-directory: client
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Deploy Frontend via SCP
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "client/.next/,client/public/,client/package.json,client/next.config.ts,client/.env"
          target: "~/payai-guardian/client"
          strip_components: 1
          rm: true

  # ===========================================
  # BACKEND BUILD & DEPLOY
  # ===========================================
  backend-deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for diff

      - name: Detect Changed Services
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: changes
        run: |
          # Get list of changed files
          if [ "${{ github.event_name }}" == "push" ]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Check each service
          if echo "$CHANGED_FILES" | grep -q "server/api-gateway/"; then
            echo "api-gateway=true" >> $GITHUB_OUTPUT
            echo "✓ API Gateway changed"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "server/user-services/"; then
            echo "user-services=true" >> $GITHUB_OUTPUT
            echo "✓ User Service changed"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "server/payment-service/"; then
            echo "payment-service=true" >> $GITHUB_OUTPUT
            echo "✓ Payment Service changed"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "server/fraud-detection-service/"; then
            echo "fraud-detection-service=true" >> $GITHUB_OUTPUT
            echo "✓ Fraud Detection Service changed"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "server/ai-banking-service/"; then
            echo "ai-banking-service=true" >> $GITHUB_OUTPUT
            echo "✓ AI Banking Service changed"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "server/analytics-service/"; then
            echo "analytics-service=true" >> $GITHUB_OUTPUT
            echo "✓ Analytics Service changed"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "server/notification-service/"; then
            echo "notification-service=true" >> $GITHUB_OUTPUT
            echo "✓ Notification Service changed"
          fi
          
          if echo "$CHANGED_FILES" | grep -q "server/shared/"; then
            echo "shared=true" >> $GITHUB_OUTPUT
            echo "✓ Shared code changed (will redeploy all)"
          fi
          
          # If shared changed or multiple services, deploy all
          if echo "$CHANGED_FILES" | grep -qE "server/(shared|package)"; then
            echo "deploy-all=true" >> $GITHUB_OUTPUT
            echo "⚠️ Deploying all services (shared/package changes)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            server/api-gateway/package-lock.json
            server/user-services/package-lock.json
            server/payment-service/package-lock.json
            server/fraud-detection-service/package-lock.json
            server/ai-banking-service/package-lock.json
            server/analytics-service/package-lock.json
            server/notification-service/package-lock.json

      - name: Install Root Dependencies
        working-directory: server
        run: npm ci

      - name: Install All Service Dependencies
        working-directory: server
        run: npm run install:all

      - name: Build All Services
        working-directory: server
        run: npm run build:all

      - name: Deploy All Services via SCP
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.changes.outputs.deploy-all == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "server/api-gateway/,server/user-services/,server/payment-service/,server/fraud-detection-service/,server/ai-banking-service/,server/analytics-service/,server/notification-service/,server/shared/,server/package.json,server/package-lock.json,server/ecosystem.config.js"
          target: "~/payai-guardian/server"
          strip_components: 1
          rm: true
          exclude: "node_modules,.env,*.log,dist"

      - name: Deploy Changed Services via SCP
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.changes.outputs.deploy-all != 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: |
            ${{ steps.changes.outputs.api-gateway == 'true' && 'server/api-gateway/,' || '' }}
            ${{ steps.changes.outputs.user-services == 'true' && 'server/user-services/,' || '' }}
            ${{ steps.changes.outputs.payment-service == 'true' && 'server/payment-service/,' || '' }}
            ${{ steps.changes.outputs.fraud-detection-service == 'true' && 'server/fraud-detection-service/,' || '' }}
            ${{ steps.changes.outputs.ai-banking-service == 'true' && 'server/ai-banking-service/,' || '' }}
            ${{ steps.changes.outputs.analytics-service == 'true' && 'server/analytics-service/,' || '' }}
            ${{ steps.changes.outputs.notification-service == 'true' && 'server/notification-service/,' || '' }}
            server/shared/,server/ecosystem.config.js
          target: "~/payai-guardian/server"
          strip_components: 1
          rm: true
          exclude: "node_modules,.env,*.log,dist"

      - name: Install Production Dependencies & Restart All Services
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.changes.outputs.deploy-all == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Load NVM (Node Version Manager)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            
            cd ~/payai-guardian/server
            
            echo "📦 Installing production dependencies for ALL services..."
            npm ci --omit=dev
            
            # Install dependencies for each service
            cd api-gateway && npm ci --omit=dev && cd ..
            cd user-services && npm ci --omit=dev && cd ..
            cd payment-service && npm ci --omit=dev && cd ..
            cd fraud-detection-service && npm ci --omit=dev && cd ..
            cd ai-banking-service && npm ci --omit=dev && cd ..
            cd analytics-service && npm ci --omit=dev && cd ..
            cd notification-service && npm ci --omit=dev && cd ..
            
            # Restart all PM2 services
            echo "🚀 Restarting ALL PM2 services..."
            pm2 restart ecosystem.config.js --env production
            
            # Save PM2 process list
            pm2 save
            
            # Show status
            echo "✅ Deployment complete!"
            pm2 status

      - name: Install & Restart Changed Services Only
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && steps.changes.outputs.deploy-all != 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            
            cd ~/payai-guardian/server
            
            echo "📦 Selective deployment - only changed services:"
            
            # API Gateway
            if [ "${{ steps.changes.outputs.api-gateway }}" = "true" ]; then
              echo "🔄 Deploying API Gateway..."
              cd api-gateway && npm ci --omit=dev && cd ..
              pm2 restart payai-gateway
            fi
            
            # User Service
            if [ "${{ steps.changes.outputs.user-services }}" = "true" ]; then
              echo "🔄 Deploying User Service..."
              cd user-services && npm ci --omit=dev && cd ..
              pm2 restart payai-user-service
            fi
            
            # Payment Service
            if [ "${{ steps.changes.outputs.payment-service }}" = "true" ]; then
              echo "🔄 Deploying Payment Service..."
              cd payment-service && npm ci --omit=dev && cd ..
              pm2 restart payai-payment-service
            fi
            
            # Fraud Detection
            if [ "${{ steps.changes.outputs.fraud-detection-service }}" = "true" ]; then
              echo "🔄 Deploying Fraud Detection..."
              cd fraud-detection-service && npm ci --omit=dev && cd ..
              pm2 restart payai-fraud-service
            fi
            
            # AI Banking
            if [ "${{ steps.changes.outputs.ai-banking-service }}" = "true" ]; then
              echo "🔄 Deploying AI Banking..."
              cd ai-banking-service && npm ci --omit=dev && cd ..
              pm2 restart payai-ai-service
            fi
            
            # Analytics
            if [ "${{ steps.changes.outputs.analytics-service }}" = "true" ]; then
              echo "🔄 Deploying Analytics..."
              cd analytics-service && npm ci --omit=dev && cd ..
              pm2 restart payai-analytics-service
            fi
            
            # Notification
            if [ "${{ steps.changes.outputs.notification-service }}" = "true" ]; then
              echo "🔄 Deploying Notification..."
              cd notification-service && npm ci --omit=dev && cd ..
              pm2 restart payai-notification-service
            fi
            
            # Save PM2 process list
            pm2 save
            
            # Show status
            echo "✅ Selective deployment complete!"
            pm2 status

  # ===========================================
  # DEPLOYMENT VERIFICATION
  # ===========================================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [frontend-deploy, backend-deploy]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Wait for Services to Start
        run: sleep 10

      - name: Check API Gateway Health
        run: |
          echo "🔍 Checking API Gateway health..."
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }}/api/health || echo "000")
          if [ "$response" = "200" ] || [ "$response" = "404" ]; then
            echo "✅ API Gateway is responding (HTTP $response)"
          else
            echo "⚠️ API Gateway returned HTTP $response"
          fi

      - name: Check Frontend
        run: |
          echo "🔍 Checking Frontend..."
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }} || echo "000")
          if [ "$response" = "200" ] || [ "$response" = "301" ] || [ "$response" = "302" ]; then
            echo "✅ Frontend is accessible (HTTP $response)"
          else
            echo "⚠️ Frontend returned HTTP $response"
          fi

      - name: Deployment Summary
        run: |
          echo "## 🎉 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: Next.js (Production Build)" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: 7 Microservices via PM2" >> $GITHUB_STEP_SUMMARY
          echo "  - API Gateway (Port 8000)" >> $GITHUB_STEP_SUMMARY
          echo "  - User Service (Port 8001)" >> $GITHUB_STEP_SUMMARY
          echo "  - Payment Service (Port 8002)" >> $GITHUB_STEP_SUMMARY
          echo "  - Fraud Detection Service (Port 8003)" >> $GITHUB_STEP_SUMMARY
          echo "  - AI Banking Service (Port 8004)" >> $GITHUB_STEP_SUMMARY
          echo "  - Analytics Service (Port 8005)" >> $GITHUB_STEP_SUMMARY
          echo "  - Notification Service (Port 8006)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully!" >> $GITHUB_STEP_SUMMARY
