  # ===========================================
  # DEPLOYMENT VERIFICATION
  # ===========================================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [
      frontend-deploy,
      deploy-api-gateway,
      deploy-user-service,
      deploy-payment-service,
      deploy-fraud-service,
      deploy-ai-service,
      deploy-analytics-service,
      deploy-notification-service
    ]
    if: always() && github.event_name == 'push'
    
    steps:
      - name: Wait for Services to Start
        run: sleep 15

      - name: Verify API Gateway
        run: |
          echo "🔍 Checking API Gateway..."
          curl -f -s -o /dev/null -w "HTTP %{http_code}\n" ${{ secrets.API_URL }}/health || echo "⚠️ API Gateway not responding"

      - name: Verify Frontend
        run: |
          echo "🔍 Checking Frontend..."
          curl -f -s -o /dev/null -w "HTTP %{http_code}\n" ${{ secrets.FRONTEND_URL }} || echo "⚠️ Frontend not responding"

      - name: Deployment Summary
        if: success()
        run: |
          echo "## 🎉 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Port | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Next.js) | 3002 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | 8000 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| User Service | 8001 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Payment Service | 8002 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Fraud Detection | 8003 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Banking | 8004 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Analytics | 8005 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Notification | 8006 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
