  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [
      frontend-deploy,
      deploy-api-gateway,
      deploy-user-service,
      deploy-payment-service,
      deploy-fraud-service,
      deploy-ai-service,
      deploy-analytics-service,
      deploy-notification-service
    ]
    if: always() && github.event_name == 'push'
    
    steps:
      - name: Wait for Services to Start
        run: sleep 15

      - name: Verify Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "🔍 Verifying services..."
            pm2 status
            for port in 3002 8000 8001 8002 8003 8004 8005 8006; do
              if curl -f -s -o /dev/null "http://localhost:$port"; then
                echo "✅ Service on port $port is running"
              else
                echo "⚠️ Service on port $port is not responding"
              fi
            done

      - name: Deployment Summary
        if: success()
        run: |
          echo "## 🎉 PayAI Guardian Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Port | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Next.js) | 3002 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| API Gateway | 8000 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| User Service | 8001 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Payment Service | 8002 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Fraud Detection | 8003 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Banking | 8004 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Analytics | 8005 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Notification | 8006 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY