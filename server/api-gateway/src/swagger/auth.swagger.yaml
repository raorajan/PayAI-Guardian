tags:
  - name: Auth
    description: User authentication endpoints (Register, Login, Password Reset)
servers:
  - url: http://localhost:8000
    description: API Gateway
paths:
  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        201:
          description: User registered successfully
        400:
          description: Missing fields
        409:
          description: Email already registered

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /api/v1/auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        200:
          description: Reset link sent if email exists
  /api/v1/auth/verify:
    get:
      tags:
        - Auth
      summary: Verify user email
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Verification token sent to the user's email
      responses:
        200:
          description: Email verified successfully
        400:
          description: Invalid or missing token
        404:
          description: User not found
  /api/v1/auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        200:
          description: Password reset successful
        400:
          description: Invalid or expired token
        404:
          description: User not found
